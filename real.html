<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dev Opportunity Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #6b6b7e;
    --accent: #7fff6e;
    --accent2: #6e9fff;
    --accent3: #ff9f6e;
    --accent4: #d46eff;
    --font: 'Syne', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(127,255,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,255,110,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    background: var(--bg);
  }

  .logo {
    padding: 0 20px 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .logo-mark {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .logo-title {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .nav { padding: 0 12px; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .nav-item:hover { color: var(--text); background: var(--surface); }
  .nav-item.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }
  .nav-item.active .nav-dot { background: var(--bg); }
  .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .sidebar-footer {
    padding: 16px 20px 0;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
  }
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* MAIN */
  .main { flex: 1; padding: 32px 36px; overflow-y: auto; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .page-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .page-title span { color: var(--accent); }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn svg { width: 13px; height: 13px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .stat-num { font-size: 22px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }

  /* SECTION */
  .section { margin-bottom: 32px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-accent {
    width: 20px; height: 3px;
    border-radius: 2px;
  }
  .count-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* TRENDING GRID */
  .trending-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .repo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .repo-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .repo-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .repo-name { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--text); line-height: 1.2; }
  .repo-stars {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .repo-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .repo-footer { display: flex; align-items: center; gap: 8px; }
  .lang-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lang-name { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .repo-tag {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    margin-left: auto;
  }

  /* JOBS LIST */
  .jobs-list { display: flex; flex-direction: column; gap: 8px; }
  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .job-card:hover { border-color: var(--accent2); }
  .job-logo {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
    letter-spacing: -0.03em;
  }
  .job-info { flex: 1; min-width: 0; }
  .job-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .job-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); font-family: var(--mono); flex-wrap: wrap; }
  .job-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: var(--mono);
    font-weight: 500;
    flex-shrink: 0;
  }
  .badge-remote { background: rgba(127,255,110,0.1); color: var(--accent); border: 1px solid rgba(127,255,110,0.2); }
  .badge-hn { background: rgba(255,159,110,0.1); color: var(--accent3); border: 1px solid rgba(255,159,110,0.2); }
  .badge-new { background: rgba(110,159,255,0.1); color: var(--accent2); border: 1px solid rgba(110,159,255,0.2); }

  /* TWO COL */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* LOADING STATE */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .error-state {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    border: 1px dashed var(--border2);
    border-radius: 12px;
  }

  /* FILTER ROW */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(127,255,110,0.07); }

  /* TABS */
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 10px; padding: 3px; width: fit-content; }
  .tab {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    border: none;
    background: none;
    font-family: var(--font);
  }
  .tab.active { background: var(--accent); color: var(--bg); }

  .hidden { display: none !important; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>

<script>
let allRepos = [];
let allHNJobs = [];
let allRemoteJobs = [];

const LANG_COLORS = {
  JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
  Go: '#00ADD8', Rust: '#dea584', C: '#555555', 'C++': '#f34b7d',
  Java: '#b07219', Ruby: '#701516', Swift: '#F05138', Kotlin: '#A97BFF',
  'C#': '#239120', PHP: '#4F5D95', Shell: '#89e051', Vue: '#41b883',
  HTML: '#e34c26', CSS: '#563d7c', Zig: '#ec915c', Nix: '#7e7eff',
};

function langColor(lang) {
  return LANG_COLORS[lang] || '#888';
}

function fmtStars(n) {
  if (!n) return '0';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n.toString();
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const diff = (Date.now() - d) / 1000;
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function initials(str) {
  return str.replace(/[^a-zA-Z\s]/g, '').trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase() || '??';
}

function repoCardHTML(r, compact) {
  const desc = r.description ? r.description.slice(0, 80) + (r.description.length > 80 ? '…' : '') : 'No description';
  return `
    <a class="repo-card" href="${r.html_url}" target="_blank" rel="noopener">
      <div class="repo-top">
        <div class="repo-name">${r.full_name}</div>
        <div class="repo-stars">★ ${fmtStars(r.stargazers_count)}</div>
      </div>
      <div class="repo-desc">${desc}</div>
      <div class="repo-footer">
        <div class="lang-dot" style="background:${langColor(r.language)}"></div>
        <div class="lang-name">${r.language || 'N/A'}</div>
        <div class="repo-tag">+${fmtStars(r.watchers_count)} watching</div>
      </div>
    </a>`;
}

function jobCardHTML(job, badgeType) {
  const badge = badgeType === 'remote'
    ? `<span class="job-badge badge-remote">Remote</span>`
    : badgeType === 'hn'
    ? `<span class="job-badge badge-hn">HN</span>`
    : `<span class="job-badge badge-new">New</span>`;
  const company = job.company || job.author || 'Company';
  const title = job.title || job.text?.slice(0, 60) || 'Role';
  const url = job.url || `https://news.ycombinator.com/item?id=${job.objectID}`;
  const meta = job.candidate_required_location || job.location || (job.created_at ? timeAgo(job.created_at) : '');
  return `
    <a class="job-card" href="${url}" target="_blank" rel="noopener">
      <div class="job-logo">${initials(company)}</div>
      <div class="job-info">
        <div class="job-title">${title}</div>
        <div class="job-meta">
          <span>${company}</span>
          ${meta ? `<span>· ${meta}</span>` : ''}
        </div>
      </div>
      ${badge}
    </a>`;
}

async function fetchRepos() {
  const since = new Date(Date.now() - 7 * 864e5).toISOString().slice(0, 10);
  const url = `https://api.github.com/search/repositories?q=created:>${since}&sort=stars&order=desc&per_page=20`;
  const r = await fetch(url, { headers: { Accept: 'application/vnd.github+json' } });
  if (!r.ok) throw new Error('GitHub API error');
  const d = await r.json();
  return d.items || [];
}

async function fetchHNJobs() {
  const r = await fetch('https://hn.algolia.com/api/v1/search_by_date?tags=ask_hn,story&query=who+is+hiring&hitsPerPage=1');
  const d = await r.json();
  const threadId = d.hits?.[0]?.objectID;
  if (!threadId) return [];
  const r2 = await fetch(`https://hn.algolia.com/api/v1/search?tags=comment,story_${threadId}&hitsPerPage=30`);
  const d2 = await r2.json();
  return (d2.hits || []).filter(h => h.text && h.text.length > 40).slice(0, 20);
}

async function fetchRemoteJobs() {
  const r = await fetch('https://remotive.com/api/remote-jobs?category=software-dev&limit=20');
  const d = await r.json();
  return d.jobs || [];
}

function renderRepos(repos, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!repos.length) { el.innerHTML = `<div class="error-state">No repos found.</div>`; return; }
  el.innerHTML = repos.map(r => repoCardHTML(r)).join('');
}

function renderJobs(jobs, containerId, type) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!jobs.length) { el.innerHTML = `<div class="error-state">No jobs found.</div>`; return; }
  el.innerHTML = jobs.map(j => jobCardHTML(j, type)).join('');
}

function filterLang(lang, btn) {
  document.querySelectorAll('#lang-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = lang === 'all' ? allRepos : allRepos.filter(r => r.language === lang);
  renderRepos(filtered.length ? filtered : allRepos, 'all-repos');
}

function filterHN(type, btn) {
  document.querySelectorAll('#hn-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'all') { renderJobs(allHNJobs, 'all-hn', 'hn'); return; }
  const filtered = allHNJobs.filter(j => j.text && j.text.toLowerCase().includes(type));
  renderJobs(filtered.length ? filtered : allHNJobs, 'all-hn', 'hn');
}

function filterRemote(type, btn) {
  document.querySelectorAll('#remote-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'all') { renderJobs(allRemoteJobs, 'all-remote', 'remote'); return; }
  const filtered = allRemoteJobs.filter(j =>
    (j.title || '').toLowerCase().includes(type) ||
    (j.tags || []).some(t => t.toLowerCase().includes(type))
  );
  renderJobs(filtered.length ? filtered : allRemoteJobs, 'all-remote', 'remote');
}

async function loadAll() {
  document.getElementById('last-updated').textContent = 'refreshing...';

  try {
    allRepos = await fetchRepos();
    document.getElementById('stat-repos').textContent = allRepos.length;
    renderRepos(allRepos.slice(0, 4), 'overview-repos');
    renderRepos(allRepos, 'all-repos');
  } catch(e) {
    document.getElementById('overview-repos').innerHTML = `<div class="error-state">GitHub rate limit — try again in a moment</div>`;
    document.getElementById('all-repos').innerHTML = `<div class="error-state">GitHub rate limit — try again in a moment</div>`;
  }

  try {
    allHNJobs = await fetchHNJobs();
    document.getElementById('stat-hn').textContent = allHNJobs.length;
    renderJobs(allHNJobs.slice(0, 3), 'overview-hn', 'hn');
    renderJobs(allHNJobs, 'all-hn', 'hn');
  } catch(e) {
    document.getElementById('overview-hn').innerHTML = `<div class="error-state">Couldn't load HN jobs</div>`;
  }

  try {
    allRemoteJobs = await fetchRemoteJobs();
    document.getElementById('stat-remote').textContent = allRemoteJobs.length;
    renderJobs(allRemoteJobs.slice(0, 3), 'overview-remote', 'remote');
    renderJobs(allRemoteJobs, 'all-remote', 'remote');
  } catch(e) {
    document.getElementById('overview-remote').innerHTML = `<div class="error-state">Couldn't load remote jobs</div>`;
  }

  const now = new Date();
  document.getElementById('last-updated').textContent =
    `updated ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
}

function showTab(name) {
  ['overview','trending','jobs','remote'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('hidden', t !== name);
  });
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    const tabs = ['overview','trending','jobs','remote'];
    el.classList.toggle('active', tabs[i] === name);
  });
}

loadAll();
</script>
</body>
</html>
